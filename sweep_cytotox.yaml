program: dfpl
command:
  - ${env}
  - "/home/shanavas/miniforge3/envs/dfpl_env/bin/python"
  - "-m"  
  -  ${program} 
  -  "train"
  -  "-f" 
  -  "/home/shanavas/PycharmProjects/deepFPlearn/example/dilshana-sweep-trial/cytotox.json"
  -  ${args}
method: random
metric:
  name: val_loss
  goal: minimize
parameters:
  dropout:
    distribution: uniform
    min: 0.05
    max: 0.3
  l2reg:
    distribution: uniform
    min: 0.00001
    max: 0.0001
  learningRate:
    distribution: uniform
    min: 0.0001
    max: 0.001
  batchSize:  # For batch size, itâ€™s better to choose from discrete values
    values: [32, 64, 128, 256, 512]
  wabTarget:
    value: AR

